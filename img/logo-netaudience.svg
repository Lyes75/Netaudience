  <rect x="10" y="12" width="20" height="20" rx="4" fill="#2E86DE"/>

  <!-- Wordmark -->
  <text x="50" y="29" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="20" letter-spacing="-0.4">
    <tspan fill="#2E86DE">net</tspan><tspan fill="#C9A96E">audience</tspan>
  </text>
</svg>
